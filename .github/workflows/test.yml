name: Test and Coverage

on:
  schedule:
    # Nightly at 04:00 UTC — full test suite with alerting on failure
    - cron: '0 4 * * *'
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
  PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
  PAPERCLIP_COMPANY_ID: ${{ secrets.PAPERCLIP_COMPANY_ID }}

jobs:
  test:
    name: pytest + coverage gate
    runs-on: ubuntu-latest

    # PostgreSQL service for ITM state store real-database tests (BTCAAAAA-450)
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: optimizer_v3
          POSTGRES_USER: optimizer_admin
          POSTGRES_PASSWORD: secure_password_change_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Qt headless)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xkb1 \
            xvfb libgl1-mesa-glx

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pytest pytest-cov pytest-qt pytest-mock pytest-postgresql \
            PyQt5 PyQt5-Qt5 PyQt5-sip \
            SQLAlchemy alembic psycopg2-binary \
            pydantic

      - name: Delete stale .coverage database
        run: rm -f .coverage

      - name: Run tests with coverage gate
        id: tests
        env:
          QT_QPA_PLATFORM: offscreen
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: optimizer_v3
          POSTGRES_USER: optimizer_admin
          POSTGRES_PASSWORD: secure_password_change_me
          PYTHONPATH: src
        run: |
          python -m pytest \
            tests/test_blast_radius/ \
            tests/test_impact_gate/ \
            tests/test_touch_index/ \
            tests/strategy_builder/validation/ \
            tests/strategy_builder/persistence/ \
            tests/strategy_builder/core/test_signal_dependency_resolver.py \
            tests/strategy_builder/core/test_strategy_config_engine.py \
            tests/optimizer_v3/test_error_recovery.py \
            tests/itm/state/ \
            tests/bug_regression/test_btcaaaaa_99_regression.py \
            tests/bug_regression/test_btcaaaaa_149_regression.py \
            tests/bug_regression/test_btcaaaaa_1477_regression.py \
            tests/bug_regression/test_btcaaaaa_198_regression.py \
            tests/bug_regression/test_btcaaaaa_20263_regression.py \
            tests/bug_regression/test_btcaaaaa_995_regression.py \
            --cov=src \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-fail-under=20 \
            -v 2>&1 | tee /tmp/test-output.txt

      - name: Alert on nightly test failure
        if: failure() && github.event_name == 'schedule'
        env:
          PYTHONPATH: src
        run: |
          python scripts/nightly_test_alert.py \
            --workflow "Test and Coverage" \
            --run-id "${{ github.run_id }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --test-output /tmp/test-output.txt

  integration-real-data:
    name: Real-data regression (BTCAAAAA-745)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install nautilus_trader pandas pyarrow

      - name: Run real-data multicore regression test
        run: |
          python -m pytest \
            tests/integration/test_btcaaaaa_745_multicore_real_data_regression.py \
            -v --timeout=300 --override-ini="addopts="

  canary-smoke:
    name: Canary trade-execution (BTCAAAAA-1476)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Qt headless)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xkb1 \
            xvfb libgl1-mesa-glx

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install nautilus_trader pandas pyarrow PyQt5 pytest pytest-qt

      - name: Run canary smoke tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest \
            tests/bug_regression/test_canary_trade_execution.py \
            -v --tb=short --no-header -q --override-ini="addopts="

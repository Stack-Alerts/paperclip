name: Lint

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  ruff:
    name: Ruff lint (no-print + datetime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (T201 no-print, DTZ003 utcnow)
        # T201: prevents print() regression after structured-logging migration (BTCAAAAA-198)
        # DTZ003: enforces timezone-aware datetimes
        run: ruff check src/ --select T201,DTZ003

  secrets-audit:
    name: Secrets audit (DIAG-2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run secrets audit
        run: python scripts/audit/secrets_audit.py

  archived-paths:
    name: Guard against re-introduction of stale-code paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify no stale-code paths exist on disk
        run: |
          set -euo pipefail
          VIOLATIONS=0

          # Dynamically parse the stale-code section from .gitignore.
          # This keeps the CI guard in sync with .gitignore automatically —
          # no need to update both files when adding new stale paths.
          # Reference: .gitignore "Stale-code archival paths" section, BTCAAAAA-26587
          IN_BLOCK=false
          while IFS= read -r line; do
            # Detect start of stale-code block
            if [[ "$line" =~ ^#[[:space:]]*Stale-code[[:space:]]archival[[:space:]]paths ]]; then
              IN_BLOCK=true
              continue
            fi
            if $IN_BLOCK; then
              # Blank line or non-comment section header ends the block
              if [[ -z "$line" ]]; then
                break
              fi
              if [[ "$line" =~ ^#[[:space:]] && ! "$line" =~ ^#[[:space:]]*$ ]]; then
                # Another section comment — stop parsing
                break
              fi
              # Skip inline comments within the block
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              # Trim trailing whitespace
              path="${line%"${line##*[![:space:]]}"}"
              if [[ -n "$path" ]]; then
                if [ -e "$path" ]; then
                  echo "::error file=$path::Stale-code path found on disk — must not exist. See archived/ directory for the original. Reference: BTCAAAAA-26587"
                  VIOLATIONS=$((VIOLATIONS + 1))
                fi
              fi
            fi
          done < .gitignore

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::${VIOLATIONS} stale-code path(s) found on disk. Remove them and move any needed logic elsewhere. Reference: BTCAAAAA-26587"
            exit 1
          fi

          echo "No stale-code path violations found."

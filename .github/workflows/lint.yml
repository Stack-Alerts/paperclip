name: Lint

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  ruff:
    name: Ruff lint (no-print + datetime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (T201 no-print, DTZ003 utcnow)
        # T201: prevents print() regression after structured-logging migration (BTCAAAAA-198)
        # DTZ003: enforces timezone-aware datetimes
        run: ruff check src/ --select T201,DTZ003

  secrets-audit:
    name: Secrets audit (DIAG-2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run secrets audit
        run: python scripts/audit/secrets_audit.py

  archived-paths:
    name: Guard against re-introduction of archived paths (BTCAAAAA-26602)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Cross-check archived/ entries against .gitignore stale-code blocklist
        run: |
          set -euo pipefail
          WARNINGS=0

          # Derived "original" paths of archived items based on known archival commit mappings.
          # When new items are added to archived/ without a corresponding .gitignore entry,
          # this check will warn the developer at CI time.
          # Mapping conventions:
          #   archived/tests/*       → tests/*
          #   archived/config/*      → config/*
          #   archived/utils_*_legacy/* → src/utils/Strategy_Builder/ (already guarded)
          #   archived/old_*/*       → scripts/*
          #   Root-level .py/.sh     → root of repo (only if actually deployed there)

          derive_original_path() {
            local item="$1"
            case "$item" in
              tests/*)         echo "tests/${item#tests/}" ;;
              config/*)        echo "config/${item#config/}" ;;
              old_walkforward_system/walkforward_tests/*)
                               echo "scripts/walkforward_tests/${item#old_walkforward_system/walkforward_tests/}" ;;
              old_optimizer_v2/*)
                               echo "scripts/${item#old_optimizer_v2/}" ;;
              utils_strategy_builder_legacy/*)
                               echo "src/utils/Strategy_Builder/${item#utils_strategy_builder_legacy/}" ;;
              optimization_results/*)
                               return 1 ;;
              *)               return 1 ;;
            esac
            return 0
          }

          # Collect the .gitignore blocklist
          GI_BLOCK=()
          IN_BLOCK=false
          while IFS= read -r line; do
            if [[ "$line" =~ ^#[[:space:]]*Stale-code[[:space:]]archival[[:space:]]paths ]]; then
              IN_BLOCK=true
              continue
            fi
            if $IN_BLOCK; then
              # Skip empty and comment lines within the block (multi-line header)
              [[ -z "$line" ]] && continue
              [[ "$line" =~ ^# ]] && continue
              # Collect non-comment, non-blank entries
              path="${line%"${line##*[![:space:]]}"}"
              [[ -n "$path" ]] && GI_BLOCK+=("$path")
            fi
          done < .gitignore

          # Walk archived/ directory recursively and check each file
          while IFS= read -r -d '' entry; do
            rel="${entry#archived/}"
            if ! derive_original_path "$rel" >/dev/null 2>&1; then
              continue
            fi
            original=$(derive_original_path "$rel")
            found=false
            for gi in "${GI_BLOCK[@]}"; do
              if [[ "$original/" =~ ^"$gi/" ]] || [[ "$original" == "$gi" ]] || [[ "$gi/" =~ ^"$original/" ]]; then
                found=true
                break
              fi
            done
            if ! $found; then
              echo "::warning::archived/$rel maps to $original but no matching entry found in .gitignore stale-code block. Add it to prevent re-introduction."
              WARNINGS=$((WARNINGS + 1))
            fi
          done < <(find archived/ -type f -print0)

          if [ "$WARNINGS" -gt 0 ]; then
            echo "::warning::$WARNINGS archived file(s) lack .gitignore stale-code entries. See warnings above."
          fi

      - name: Verify no stale-code / archived paths exist on disk
        id: verify-archived
        run: |
          set -euo pipefail
          VIOLATIONS=0
          VIOLATION_FILE=/tmp/archived-path-violations.txt
          :> "$VIOLATION_FILE"

          # Dynamically parse the stale-code & archived-paths section from .gitignore.
          # This keeps the CI guard in sync with .gitignore automatically —
          # no need to update both files when adding new stale paths.
          # Reference: .gitignore "Stale-code archival paths" section
          IN_BLOCK=false
          while IFS= read -r line; do
            # Detect start of stale-code block
            if [[ "$line" =~ ^#[[:space:]]*Stale-code[[:space:]]archival[[:space:]]paths ]]; then
              IN_BLOCK=true
              continue
            fi
            if $IN_BLOCK; then
              # Skip empty and comment lines within the block (multi-line header)
              [[ -z "$line" ]] && continue
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              # Trim trailing whitespace
              path="${line%"${line##*[![:space:]]}"}"
              if [[ -n "$path" ]]; then
                if [ -e "$path" ]; then
                  echo "::error file=$path::Archived path $path must not be re-created. See docs/runbook-archive.md."
                  echo "$path" >> "$VIOLATION_FILE"
                  VIOLATIONS=$((VIOLATIONS + 1))
                fi
              fi
            fi
          done < .gitignore

          echo "violation_count=$VIOLATIONS" >> "$GITHUB_OUTPUT"

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::${VIOLATIONS} archived path(s) must not be re-created. See docs/runbook-archive.md."
            exit 1
          fi

          echo "No archived-path violations found." >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Markdown report
        if: always() && steps.verify-archived.outputs.violation_count != '0'
        run: |
          {
            echo "## Archived Path Guard (BTCAAAAA-26602)"
            echo ""
            echo "| Status | Details |"
            echo "|---|---|"
            echo "| ❌ Guard failed | ${{ steps.verify-archived.outputs.violation_count }} archived path(s) detected on disk |"
            echo ""
            echo "### Violations"
            echo ""
            while IFS= read -r path; do
              [[ -z "$path" ]] && continue
              echo "- \`$path\` — Archived path must not be re-created. See [docs/runbook-archive.md](../docs/runbook-archive.md)."
            done < /tmp/archived-path-violations.txt
            echo ""
            echo "Remove the listed files and move any needed logic elsewhere."
          } > /tmp/archived-path-report.md

          cat /tmp/archived-path-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.verify-archived.outputs.violation_count != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/archived-path-report.md', 'utf8');
            const body = report;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Archived Path Guard'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

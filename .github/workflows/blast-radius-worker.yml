name: Blast Radius Worker

on:
  schedule:
    # Every 5 minutes — detect fix→in_review transitions and post reports
    - cron: '*/5 * * * *'
  repository_dispatch:
    types: [issue_status_changed]
  workflow_dispatch:
    inputs:
      issue_id:
        description: 'Paperclip issue UUID (single-issue webhook trigger)'
        required: false
        default: ''
      old_status:
        description: 'Previous issue status (from status-change webhook)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (log reports, do not post comments)'
        required: false
        default: 'false'
      loop_seconds:
        description: 'Loop interval in seconds (0 = run once)'
        required: false
        default: '0'
      force_reprocess:
        description: 'Re-process already-seen issues'
        required: false
        default: 'false'

concurrency:
  group: blast-radius-worker
  cancel-in-progress: false

jobs:
  worker:
    name: Detect fix->in_review and post Blast Radius Report
    runs-on: self-hosted

    env:
      PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
      PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
      PAPERCLIP_BOARD_API_KEY: ${{ secrets.PAPERCLIP_BOARD_API_KEY }}
      PAPERCLIP_COMPANY_ID: ${{ secrets.PAPERCLIP_COMPANY_ID }}
      PAPERCLIP_RUN_ID: ${{ github.run_id }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST || 'localhost' }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT || '5432' }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB || 'optimizer_v3' }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER || 'optimizer_admin' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        run: python3 --version

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Restore worker state cache
        id: cache-state
        uses: actions/cache/restore@v4
        with:
          path: data/blast_radius_worker_state.json
          key: blast-radius-state-${{ github.run_id }}
          restore-keys: |
            blast-radius-state-

      - name: Resolve issue ID and old_status (event payload)
        id: resolve-issue
        run: |
          ISSUE_ID="${{ github.event.inputs.issue_id || '' }}"
          OLD_STATUS="${{ github.event.inputs.old_status || '' }}"
          if [ -z "$ISSUE_ID" ] && [ -n "${{ github.event.client_payload.issue_id || '' }}" ]; then
            ISSUE_ID="${{ github.event.client_payload.issue_id }}"
            OLD_STATUS="${{ github.event.client_payload.old_status || '' }}"
          fi
          echo "issue_id=$ISSUE_ID" >> $GITHUB_OUTPUT
          echo "old_status=$OLD_STATUS" >> $GITHUB_OUTPUT

      - name: Run Blast Radius worker
        run: |
          FLAGS="--json-summary"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ "${{ github.event.inputs.force_reprocess }}" = "true" ]; then
            FLAGS="$FLAGS --force-reprocess"
          fi
          ISSUE_ID="${{ steps.resolve-issue.outputs.issue_id }}"
          OLD_STATUS="${{ steps.resolve-issue.outputs.old_status }}"
          if [ -n "$ISSUE_ID" ]; then
            python scripts/run_blast_radius_worker.py --issue-id "$ISSUE_ID" \
              ${OLD_STATUS:+--old-status "$OLD_STATUS"} \
              $FLAGS > /tmp/br-output.json
          elif [ "${{ github.event.inputs.loop_seconds }}" != "0" ] && [ -n "${{ github.event.inputs.loop_seconds }}" ]; then
            python scripts/run_blast_radius_worker.py --loop ${{ github.event.inputs.loop_seconds }} $FLAGS > /tmp/br-output.json
          else
            python scripts/run_blast_radius_worker.py $FLAGS > /tmp/br-output.json
          fi

      - name: Upload worker output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blast-radius-worker-output
          path: /tmp/br-output.json
          retention-days: 30

      - name: Write step summary
        if: always()
        run: |
          if [ -f /tmp/br-output.json ]; then
            python3 >> $GITHUB_STEP_SUMMARY << 'PYEOF'
          import json
          with open('/tmp/br-output.json') as f:
              data = json.load(f)
          mode = data.get('mode', 'unknown')
          dry_run = data.get('dry_run', False)
          issues = data.get('issues_processed', 'N/A')
          errors = data.get('issues_with_errors', 0)
          result = data.get('result', {})
          print('## Blast Radius Worker Summary')
          print('')
          print('| Metric | Value |')
          print('|---|---|')
          print('| Mode |' + ' ' + str(mode) + ' |')
          print('| Dry run |' + ' ' + str(dry_run) + ' |')
          print('| Issues processed |' + ' ' + str(issues) + ' |')
          print('| Issues with errors |' + ' ' + str(errors) + ' |')
          if result:
              skipped = result.get('skipped', False)
              error = result.get('error')
              print('| Skipped |' + ' ' + str(skipped) + ' |')
              if error:
                  print('| Error |' + ' ' + str(error) + ' |')
          PYEOF
          fi

      - name: Monitor worker output for errors
        if: always()
        env:
          PYTHONPATH: src
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          PAPERCLIP_BOARD_API_KEY: ${{ secrets.PAPERCLIP_BOARD_API_KEY }}
          PAPERCLIP_COMPANY_ID: ${{ secrets.PAPERCLIP_COMPANY_ID }}
        run: |
          if [ -f /tmp/br-output.json ]; then
            python scripts/blast_radius_monitor.py \
              --worker-output /tmp/br-output.json \
              --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              2>&1 | tee /tmp/br-monitor.log
          fi

      - name: Save worker state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/blast_radius_worker_state.json
          key: blast-radius-state-${{ github.run_id }}

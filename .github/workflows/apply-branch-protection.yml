name: Apply Branch Protection

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  administration: write

jobs:
  protect:
    name: Apply branch protection rules to main
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check token permissions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Token Diagnostic" >> "$GITHUB_STEP_SUMMARY"
          echo "- Actor: \`${{ github.actor }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow: \`${{ github.workflow }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Event: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"

          HTTP_CODE=$(gh api repos/${{ github.repository }} --silent -o /dev/null -w "%{http_code}" 2>&1 || echo "FAIL")
          echo "- Repo API access: \`$HTTP_CODE\`" >> "$GITHUB_STEP_SUMMARY"

          ADMIN_CODE=$(gh api repos/${{ github.repository }}/branches/main/protection --silent -o /dev/null -w "%{http_code}" 2>&1 || echo "FAIL")
          echo "- Branch protection API access: \`$ADMIN_CODE\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Check if protection already applied
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT=$(gh api \
            repos/${{ github.repository }}/branches/main/protection \
            --jq '.required_pull_request_reviews.required_approving_review_count' \
            2>/dev/null || echo "not_protected")
          echo "current=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Apply or update branch protection
        if: steps.check.outputs.current == 'not_protected'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json, subprocess, sys
          payload = {
              'required_status_checks': {
                  'strict': True,
                  'checks': [
                      {'context': 'Ruff lint (no-print + datetime)'},
                      {'context': 'pytest + coverage gate'},
                      {'context': 'Module lock gate'},
                      {'context': 'Freeze-lift evidence suite'},
                      {'context': 'Real-data regression (BTCAAAAA-745)'},
                      {'context': 'Secrets audit (DIAG-2)'},
                  ]
              },
              'enforce_admins': True,
              'required_pull_request_reviews': {
                  'required_approving_review_count': 1,
                  'dismiss_stale_reviews': True,
                  'require_code_owner_reviews': False
              },
              'restrictions': None,
              'required_linear_history': False,
              'allow_force_pushes': False,
              'allow_deletions': False,
              'block_creations': False,
              'required_conversation_resolution': True,
              'lock_branch': False,
              'allow_fork_syncing': True
          }
          repo = '${{ github.repository }}'
          p = subprocess.run(
              ['gh', 'api', '--method', 'PUT',
               f'repos/{repo}/branches/main/protection',
               '--input', '-'],
              input=json.dumps(payload).encode(),
              capture_output=True
          )
          sys.stdout.write('STDOUT: ' + p.stdout.decode())
          sys.stderr.write('STDERR: ' + p.stderr.decode())
          if p.returncode:
              print(f'FAILED with exit code {p.returncode}', flush=True)
              exit(p.returncode)
          print('SUCCESS', flush=True)
          "

      - name: Verify protection applied
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Branch Protection Status" >> "$GITHUB_STEP_SUMMARY"
          gh api repos/${{ github.repository }}/branches/main/protection \
            --jq '{enabled: true, reviews: .required_pull_request_reviews.required_approving_review_count, strict: .required_status_checks.strict, admins: .enforce_admins.enabled}' \
            2>/dev/null >> "$GITHUB_STEP_SUMMARY" || \
            echo "FAILED to verify — token may lack administration:write" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Protection applied successfully to \`main\`." >> "$GITHUB_STEP_SUMMARY"

      - name: Commit result marker
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '{"protected": true, "applied_at": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "sha": "${{ github.sha }}"}' \
            > branch-protection-status.json
          git config user.name "RepoSteward"
          git config user.email "reposteward@stack-alerts"
          git add branch-protection-status.json
          git commit -m "chore: record branch protection applied [skip ci]" || true

      - name: Push result marker
        if: success()
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          force: false

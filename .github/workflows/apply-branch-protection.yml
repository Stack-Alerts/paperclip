name: Apply Branch Protection

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  administration: write

jobs:
  protect:
    name: Apply branch protection rules to main
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if protection already applied
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT=$(gh api \
            repos/${{ github.repository }}/branches/main/protection \
            --jq '.required_pull_request_reviews.required_approving_review_count' \
            2>/dev/null || echo "not_protected")
          echo "current=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Apply or update branch protection
        if: steps.check.outputs.current == 'not_protected'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json, subprocess
          payload = {
              'required_status_checks': {
                  'strict': True,
                  'checks': [
                      {'context': 'Ruff lint (no-print + datetime)'},
                      {'context': 'pytest + coverage gate'},
                      {'context': 'Module lock gate'},
                      {'context': 'Freeze-lift evidence suite'},
                      {'context': 'Real-data regression (BTCAAAAA-745)'},
                      {'context': 'Secrets audit (DIAG-2)'},
                  ]
              },
              'enforce_admins': True,
              'required_pull_request_reviews': {
                  'required_approving_review_count': 1,
                  'dismiss_stale_reviews': True,
                  'require_code_owner_reviews': False
              },
              'restrictions': None,
              'required_linear_history': False,
              'allow_force_pushes': False,
              'allow_deletions': False,
              'block_creations': False,
              'required_conversation_resolution': True,
              'lock_branch': False,
              'allow_fork_syncing': True
          }
          repo = '${{ github.repository }}'
          p = subprocess.run(
              ['gh', 'api', '--method', 'PUT',
               f'repos/{repo}/branches/main/protection',
               '--input', '-'],
              input=json.dumps(payload).encode(), capture_output=True
          )
          print(p.stdout.decode())
          if p.returncode:
              exit(p.returncode)
          "

      - name: Verify protection applied
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Branch Protection Status" >> "$GITHUB_STEP_SUMMARY"
          gh api repos/${{ github.repository }}/branches/main/protection \
            --jq '{enabled: true, reviews: .required_pull_request_reviews.required_approving_review_count, strict: .required_status_checks.strict, admins: .enforce_admins.enabled}' \
            >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Protection applied successfully to \`main\`." >> "$GITHUB_STEP_SUMMARY"

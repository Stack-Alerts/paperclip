name: Apply Branch Protection

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  administration: write

jobs:
  protect:
    name: Apply branch protection to main
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Check current protection status
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HTTP_CODE=$(gh api \
            repos/${{ github.repository }}/branches/main/protection \
            --silent -o /dev/null -w "%{http_code}" 2>&1 || echo "FAIL")
          echo "current_http=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "Protection GET returned HTTP $HTTP_CODE"

      - name: Apply minimal branch protection
        if: steps.check.outputs.current_http != '200'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json, subprocess, sys
          payload = {
              'required_status_checks': None,
              'enforce_admins': True,
              'required_pull_request_reviews': {
                  'required_approving_review_count': 1,
                  'dismiss_stale_reviews': True,
              },
              'restrictions': None,
              'required_linear_history': False,
              'allow_force_pushes': False,
              'allow_deletions': False,
              'block_creations': False,
              'required_conversation_resolution': True,
          }
          repo = '${{ github.repository }}'
          p = subprocess.run(
              ['gh', 'api', '--method', 'PUT',
               f'repos/{repo}/branches/main/protection',
               '--input', '-'],
              input=json.dumps(payload).encode(), capture_output=True)
          sys.stdout.write(p.stdout.decode())
          sys.stderr.write(p.stderr.decode())
          sys.exit(p.returncode)
          "

      - name: Verify
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Branch Protection Result" >> "$GITHUB_STEP_SUMMARY"
          gh api repos/${{ github.repository }}/branches/main/protection \
            --jq '{reviews: .required_pull_request_reviews.required_approving_review_count, admins: .enforce_admins.enabled, no_force_push: (.allow_force_pushes == false)}' \
            2>/dev/null >> "$GITHUB_STEP_SUMMARY" || \
            echo "Verification failed" >> "$GITHUB_STEP_SUMMARY"

name: Apply Branch Protection

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  protect:
    name: Apply branch protection to main
    runs-on: ubuntu-latest
    steps:
      - name: Check branch protection status
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # GITHUB_TOKEN cannot read/write branch protection (requires admin PAT).
          # When ADMIN_PAT is absent, workflow exits 0 with an informational warning.
          # Add ADMIN_PAT secret (repo + administration scope) to enable full drift detection.

          if ! PROTECTION=$(gh api "repos/${{ github.repository }}/branches/main/protection" 2>&1); then
            echo "::warning::Branch protection monitoring unavailable — add ADMIN_PAT secret for drift detection."
            echo "## ⚠️ Branch Protection Monitoring Unavailable" >> "$GITHUB_STEP_SUMMARY"
            echo "GITHUB_TOKEN cannot read branch protection (requires admin PAT)." >> "$GITHUB_STEP_SUMMARY"
            echo "Protection was applied manually and persists. Add \`ADMIN_PAT\` secret to enable drift detection." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          REVIEWS=$(echo "$PROTECTION" | jq '.required_pull_request_reviews.required_approving_review_count')
          DISMISS=$(echo "$PROTECTION" | jq '.required_pull_request_reviews.dismiss_stale_reviews')
          STRICT=$(echo "$PROTECTION" | jq '.required_status_checks.strict')
          FORCE=$(echo "$PROTECTION" | jq '.allow_force_pushes.enabled')
          DELETES=$(echo "$PROTECTION" | jq '.allow_deletions.enabled')

          DRIFT=0
          [ "$REVIEWS" != "1" ]     && echo "::error::DRIFT: required_approving_review_count=$REVIEWS (expected 1)" && DRIFT=1
          [ "$DISMISS" != "true" ]  && echo "::error::DRIFT: dismiss_stale_reviews=$DISMISS (expected true)"        && DRIFT=1
          [ "$STRICT"  != "true" ]  && echo "::error::DRIFT: status_checks.strict=$STRICT (expected true)"          && DRIFT=1
          [ "$FORCE"   != "false" ] && echo "::error::DRIFT: allow_force_pushes=$FORCE (expected false)"            && DRIFT=1
          [ "$DELETES" != "false" ] && echo "::error::DRIFT: allow_deletions=$DELETES (expected false)"             && DRIFT=1

          if [ "$DRIFT" -eq 1 ]; then
            echo "::error::Branch protection has drifted from policy. Manual re-apply required."
            exit 1
          fi

          echo "## ✅ Branch Protection Verified" >> "$GITHUB_STEP_SUMMARY"
          echo "$PROTECTION" | jq '{
            reviews_required: .required_pull_request_reviews.required_approving_review_count,
            dismiss_stale: .required_pull_request_reviews.dismiss_stale_reviews,
            status_checks_strict: .required_status_checks.strict,
            force_push_allowed: .allow_force_pushes.enabled,
            deletions_allowed: .allow_deletions.enabled
          }' >> "$GITHUB_STEP_SUMMARY"

          echo "Branch protection verified — all settings match policy."

name: Apply Branch Protection

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  administration: write

jobs:
  protect:
    name: Apply branch protection to main
    runs-on: ubuntu-latest
    steps:
      - name: Apply branch protection (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PUT \
            "repos/${{ github.repository }}/branches/main/protection" \
            --input - <<'PAYLOAD'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": []
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "required_approving_review_count": 1,
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false,
              "require_last_push_approval": false
            },
            "restrictions": null,
            "required_linear_history": false,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_conversation_resolution": true
          }
          PAYLOAD

      - name: Verify protection applied
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Branch Protection Status" >> "$GITHUB_STEP_SUMMARY"
          gh api "repos/${{ github.repository }}/branches/main/protection" \
            --jq '{
              reviews_required: .required_pull_request_reviews.required_approving_review_count,
              dismiss_stale: .required_pull_request_reviews.dismiss_stale_reviews,
              status_checks_strict: .required_status_checks.strict,
              force_push_allowed: .allow_force_pushes.enabled,
              deletions_allowed: .allow_deletions.enabled,
              conversation_resolution: .required_conversation_resolution.enabled
            }' >> "$GITHUB_STEP_SUMMARY"

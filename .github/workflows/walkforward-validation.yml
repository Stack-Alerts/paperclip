name: Walkforward Validation

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: ["main", "master"]
    paths:
      - 'src/strategy_builder/testing/walkforward_test_engine.py'
      - 'src/strategy_builder/core/**'
      - 'src/strategy_builder/execution/**'
      - 'src/strategies/**'
      - 'tests/strategy_builder/testing/**'
      - 'tests/strategies/**'
      - '.github/workflows/walkforward-validation.yml'
  pull_request:
    branches: ["main", "master"]
    paths:
      - 'src/strategy_builder/testing/walkforward_test_engine.py'
      - 'src/strategy_builder/core/**'
      - 'src/strategy_builder/execution/**'
      - 'src/strategies/**'
      - 'tests/strategy_builder/testing/**'
      - 'tests/strategies/**'
      - '.github/workflows/walkforward-validation.yml'
  workflow_dispatch:

env:
  PYTHONPATH: src

jobs:
  walkforward-unit:
    name: Walkforward unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov numpy pandas pyarrow

      - name: Run walkforward unit tests
        run: |
          python -m pytest \
            tests/strategy_builder/testing/test_walkforward_test_engine.py \
            -v --tb=short

  walkforward-strategy:
    name: Walkforward strategy validation (real data)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pandas numpy pyarrow nautilus-trader

      - name: Verify BTC data availability
        run: |
          if [ ! -f data/raw/BTC_USDT_PERP_30m.pkl ]; then
            echo "30m BTC data file not found — skipping real-data walkforward"
            exit 0
          fi
          echo "30m BTC data file found ($(wc -c < data/raw/BTC_USDT_PERP_30m.pkl) bytes)"

      - name: Download previous walkforward registry
        id: download-registry
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: walkforward-registry
          path: .

      - name: Run walkforward strategy validation
        run: |
          python -m pytest \
            tests/strategies/01_test_strategy_Reversal_M_Pattern_Standard.py \
            tests/strategies/02_test_strategy_Reversal_W_Pattern_Standard.py \
            tests/strategies/test_strategy_with_backtest.py \
            tests/strategies/walkforward_test.py \
            -v --tb=short --timeout=900 -p no:cacheprovider \
            2>&1 | tee /tmp/walkforward-output.txt

      - name: Run CI walkforward registry update
        env:
          PYTHONPATH: src
        run: |
          for strategy_path in \
            src/strategies/strategy_01_reversal_m_pattern.py \
            src/strategies/strategy_02_reversal_w_pattern.py; do
            if [ -f "$strategy_path" ]; then
              echo "--- Running CI walkforward: $strategy_path ---"
              python scripts/run_walkforward_ci.py \
                --strategy "$strategy_path" \
                --data data/raw/BTC_USDT_PERP_30m.pkl \
                --days 60 \
                --timeout 600 \
                --strict \
                || echo "WARNING: CI walkforward failed for $strategy_path (non-fatal)"
            fi
          done

      - name: Alert on nightly walkforward failure
        if: failure() && github.event_name == 'schedule'
        env:
          PYTHONPATH: src
        run: |
          python scripts/nightly_test_alert.py \
            --workflow "Walkforward Validation" \
            --run-id "${{ github.run_id }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --test-output /tmp/walkforward-output.txt

      - name: Upload walkforward artifacts
        if: always()
        uses: actions/upload-artifact@v4.4.0
        with:
          name: walkforward-reports
          path: |
            data/reports/walkforward_tests/
            /tmp/walkforward-output.txt
          retention-days: 90

      - name: Upload walkforward registry
        if: always()
        uses: actions/upload-artifact@v4.4.0
        with:
          name: walkforward-registry
          path: walkforward_results_registry.json
          retention-days: 90
          overwrite: true

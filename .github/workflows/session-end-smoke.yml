name: Session-End Autosave Smoke

on:
  pull_request:
    paths:
      - 'scripts/session_end_autosave.py'
      - 'scripts/opencode_watchdog.py'
      - 'scripts/smoke/session-end-autosave-smoke.test.mjs'
      - '.github/workflows/session-end-smoke.yml'
  workflow_dispatch:

concurrency:
  group: session-end-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install ruff
        run: pip install --quiet "ruff==0.13.0"

      - name: Ruff check Python files
        run: |
          ruff check scripts/session_end_autosave.py scripts/opencode_watchdog.py

      - name: Run session-end autosave smoke
        run: node scripts/smoke/session-end-autosave-smoke.test.mjs

      - name: Ruff format check
        run: |
          ruff format --check scripts/session_end_autosave.py scripts/opencode_watchdog.py

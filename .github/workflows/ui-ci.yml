name: UI CI

# RTM: BTE-UI-TOOLS-001 — BTCAAAAA-27654
# Validates the React UI modules in packages/web-ui on every PR and push.
# Pipeline: typecheck → lint → build → tooltip-coverage

on:
  push:
    branches: ["main", "master"]
    paths:
      - "packages/web-ui/**"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "packages/web-ui/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: packages/web-ui

jobs:
  # ─── 1. Type Check ────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript — strict type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tsc (no emit)
        run: npx tsc --noEmit

  # ─── 2. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4.2.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0

  # ─── 3. Production Build ──────────────────────────────────────────────────
  build:
    name: Next.js production build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4.2.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.4.0
        with:
          name: nextjs-build
          path: packages/web-ui/.next/
          retention-days: 7

  # ─── 4. Tooltip Registry Coverage ─────────────────────────────────────────
  tooltip-coverage:
    name: Tooltip registry coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4.2.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify tooltip registry is non-empty per module
        run: |
          node -e "
            const { TOOLTIP_REGISTRY, getTotalTooltipCount } = require('./src/lib/tooltip-registry.ts');
            // Use ts-node for TypeScript evaluation
          " 2>/dev/null || true

      - name: Check tooltip registry coverage with ts-node
        run: |
          set -euo pipefail
          npx ts-node --project tsconfig.json --skip-project << 'EOF'
          import { TOOLTIP_REGISTRY, getTotalTooltipCount, getRegistrySummary } from './src/lib/tooltip-registry';

          const REQUIRED_MODULES = ['backtest', 'data-management', 'log-viewer', 'settings'];
          const MIN_TOOLTIPS_PER_MODULE = 3;

          let failed = false;
          const summary = getRegistrySummary();

          console.log('Tooltip Registry Coverage Report');
          console.log('================================');

          for (const mod of REQUIRED_MODULES) {
            const count = summary[mod] ?? 0;
            const ok = count >= MIN_TOOLTIPS_PER_MODULE;
            const status = ok ? '✅' : '❌';
            console.log(`${status} ${mod}: ${count} tooltip(s) (min: ${MIN_TOOLTIPS_PER_MODULE})`);
            if (!ok) failed = true;
          }

          console.log('');
          console.log(`Total tooltips registered: ${getTotalTooltipCount()}`);

          if (failed) {
            console.error('\nERROR: One or more modules have insufficient tooltip coverage.');
            process.exit(1);
          } else {
            console.log('\nAll modules meet the minimum tooltip coverage requirement.');
          }
          EOF

  # ─── 5. predev branch-gate smoke (BTCAAAAA-31217) ─────────────────────────
  predev-gate-smoke:
    name: predev branch-gate smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0
        with:
          fetch-depth: 0

      - name: Run predev gate smoke test
        run: bash __tests__/predev-gate.smoke.sh

  # ─── Summary ──────────────────────────────────────────────────────────────
  ui-ci-summary:
    name: UI CI — all gates passed
    runs-on: ubuntu-latest
    needs: [typecheck, lint, build, tooltip-coverage, predev-gate-smoke]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "## UI CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| TypeScript check | ${{ needs.typecheck.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ESLint | ${{ needs.lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Next.js build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tooltip coverage | ${{ needs.tooltip-coverage.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| predev branch-gate smoke | ${{ needs.predev-gate-smoke.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any gate failed
        if: |
          needs.typecheck.result == 'failure' ||
          needs.lint.result == 'failure' ||
          needs.build.result == 'failure' ||
          needs.tooltip-coverage.result == 'failure' ||
          needs.predev-gate-smoke.result == 'failure'
        run: |
          echo "One or more UI CI gates failed. See above for details."
          exit 1

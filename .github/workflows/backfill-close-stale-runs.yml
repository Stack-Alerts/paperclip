name: Backfill — Close Stale Running Runs

on:
  schedule:
    - cron: '0 * * * *'  # hourly — auto-cleanup, runs for real
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (report only, do not cancel)'
        required: false
        default: 'true'
      stale_minutes:
        description: 'Silence threshold in minutes'
        required: false
        default: '60'
      issue_ids:
        description: 'Comma-separated issue identifiers to close (e.g. BTCAAAAA-1317,BTCAAAAA-1278)'
        required: false
        default: ''

jobs:
  close-stale:
    name: Close stale in_progress runs and issues
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4.2.0

      - name: Set up Python
        run: python3 --version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stale-run closer
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_COMPANY_ID: ${{ secrets.PAPERCLIP_COMPANY_ID }}
          PAPERCLIP_BOARD_API_KEY: ${{ secrets.PAPERCLIP_BOARD_API_KEY }}
        run: |
          FLAGS=""
          SCHEDULED="${{ github.event_name == 'schedule' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ] && [ "$SCHEDULED" != "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.stale_minutes }}" ]; then
            FLAGS="$FLAGS --stale-minutes ${{ github.event.inputs.stale_minutes }}"
          fi
          if [ -n "${{ github.event.inputs.issue_ids }}" ]; then
            FLAGS="$FLAGS --issue-ids ${{ github.event.inputs.issue_ids }}"
          fi
          python scripts/backfill_close_stale_runs.py $FLAGS

name: Token-Gap Escalation (Blocker Verification)

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no escalations posted)'
        required: false
        default: 'true'

permissions:
  contents: read

jobs:
  token-gap-escalation:
    name: Verify blockedBy before escalating token-gap issues
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4.2.0

      - name: Set up Python
        run: python3 --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run token-gap escalation routine
        id: escalation
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          PAPERCLIP_COMPANY_ID: ${{ secrets.PAPERCLIP_COMPANY_ID }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            FLAGS="--dry-run"
          fi
          python scripts/token_gap_escalation_blocker_verification.py $FLAGS | tee /tmp/escalation-output.log

      - name: Archive logs
        if: always()
        uses: actions/upload-artifact@v4.4.0
        with:
          name: token-gap-escalation-logs
          path: /tmp/escalation-output.log
          retention-days: 7
